project:
  type: book

lang: en

execute:
  freeze: auto
  echo: false
  warning: false

book:
  title: "Python SQL Setup Guide"
  subtitle: "MSSQL & Streamlit"
  search:
    type: overlay
  page-footer:
    left: |
      © Jan Kirenz, 2026

  chapters:
    - index.qmd
    - part: "Preparation"
      chapters:
        - windows-setup.qmd
        - mac-setup.qmd
        - mssql-vscode.qmd
    - part: "Repositories"
      chapters:
        - practice-repositories.qmd
    - part: "Application"
      chapters:
        - mssql-connection.qmd
        - streamlit.qmd

number-sections: true

format:
  html:
    toc: true
    theme:
      - cosmo
      - theme.scss
    code-copy: true
    highlight-style: github
    code-overflow: wrap
    author-meta: "Jan Kirenz"
    callout-appearance: simple
    include-in-header:
      text: |
        <style>
        .cmd-explain {
          font-weight: 600;
          margin-top: 1rem;
        }
        </style>
